# MoltGuard CI — minimal V1.
# Per moltguard-remote-migration SPEC §3.5 + §9.4 RESOLVED (no linting V1).
# Establishes type-check (tsc) + test (vitest) on push to main and on PRs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build (tsc → dist/)
        run: npm run build

      - name: Run tests (vitest)
        run: npm test
